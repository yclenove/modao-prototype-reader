<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modao Prototype Reader</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111f;
        --panel: #101b2d;
        --panel-strong: #14233a;
        --text: #ecf3ff;
        --muted: #9bb0cf;
        --accent: #52c7ff;
        --accent-strong: #30a9ef;
        --border: rgba(255, 255, 255, 0.08);
        --danger: #ff8c8c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(82, 199, 255, 0.14), transparent 30%),
          radial-gradient(circle at right, rgba(126, 86, 255, 0.14), transparent 35%),
          var(--bg);
        color: var(--text);
      }
      .page {
        width: min(1280px, calc(100vw - 32px));
        margin: 24px auto 48px;
      }
      h1, h2, h3 { margin: 0; }
      p { color: var(--muted); }
      .hero { margin-bottom: 20px; }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: 380px 1fr;
        align-items: start;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .tab {
        width: auto;
        padding: 8px 14px;
        border-radius: 999px;
      }
      .tab.secondary.active {
        background: rgba(82, 199, 255, 0.18);
        border-color: rgba(82, 199, 255, 0.45);
      }
      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
      }
      .stack { display: grid; gap: 12px; }
      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      input, select, button, textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }
      textarea {
        min-height: 320px;
        resize: vertical;
      }
      button {
        cursor: pointer;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #04101f;
        font-weight: 700;
        border: 0;
      }
      button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .inline {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .stats {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .stat {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255,255,255,0.02);
      }
      .stat strong { display: block; font-size: 24px; margin-top: 8px; }
      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
      }
      .status.error { color: var(--danger); }
      .status.loading { color: var(--accent); }
      .read-hint {
        margin: 0;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
        background: rgba(82, 199, 255, 0.08);
        border: 1px solid rgba(82, 199, 255, 0.2);
        border-radius: 12px;
      }
      .read-progress {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(82, 199, 255, 0.35);
        background: rgba(82, 199, 255, 0.06);
      }
      .read-progress[hidden] { display: none !important; }
      .read-progress-row {
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      .read-phase {
        font-size: 14px;
        color: var(--text);
        line-height: 1.45;
        margin-bottom: 6px;
      }
      .read-elapsed {
        font-size: 12px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .spinner {
        width: 22px;
        height: 22px;
        margin-top: 2px;
        flex-shrink: 0;
        border: 3px solid rgba(82, 199, 255, 0.25);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.72;
      }
      .checkbox {
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
      }
      .checkbox input {
        width: auto;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .diagnostics {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255,255,255,0.02);
      }
      .diagnostics p {
        margin: 0 0 8px;
      }
      .files-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .file-chip {
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255,255,255,0.02);
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #dce7fb;
      }
      img {
        max-width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
        .stats, .inline { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="hero">
        <h1>Modao Prototype Reader</h1>
        <p>本地工作台支持读取墨刀、分析 scaffold，并生成 Vue 3 页面骨架。</p>
      </div>

      <div class="grid">
        <section class="card stack">
          <div class="tabs">
            <button class="secondary tab active" id="tabRead">Read</button>
            <button class="secondary tab" id="tabAnalyze">Analyze</button>
            <button class="secondary tab" id="tabGenerate">Generate</button>
          </div>
          <label>
            墨刀分享链接
            <input id="url" placeholder="https://modao.cc/app/... 或 /proto/.../sharing?..." />
          </label>

          <div class="inline">
            <label>
              密码
              <input id="password" placeholder="可选" />
            </label>
            <label>
              深度
              <select id="depth">
                <option value="basic">basic</option>
                <option value="rich" selected>rich</option>
                <option value="full">full</option>
              </select>
            </label>
          </div>

          <div class="inline">
            <label>
              范围
              <select id="only">
                <option value="all">all</option>
                <option value="current">current</option>
                <option value="screen">screen</option>
                <option value="module">module</option>
              </select>
            </label>
            <label>
              超时毫秒
              <input id="timeoutMs" type="number" value="120000" />
            </label>
          </div>

          <div class="inline">
            <label>
              页面 CID
              <input id="screen" placeholder="可选" />
            </label>
            <label>
              页面名称关键字
              <input id="screenName" placeholder="可选" />
            </label>
          </div>

          <div class="inline">
            <label>
              Chrome 用户目录
              <input id="chromeUserDataDir" placeholder="可选" />
            </label>
            <label>
              Chrome Profile
              <input id="chromeProfileDirectory" placeholder="可选" />
            </label>
          </div>

          <label class="checkbox">
            <input id="debug" type="checkbox" />
            开启调试诊断，返回 probe 和失败详情
          </label>

          <label class="checkbox">
            <input id="screenshot" type="checkbox" />
            勾选后返回页面截图（PNG）
          </label>

          <p class="read-hint">
            点击「开始读取」后，本机会启动 Chrome 并打开上面的链接，通常需要 <strong>30 秒～2 分钟</strong>。
            若弹出浏览器窗口、似乎「停住」，一般仍在后台轮询墨刀数据，请耐心等待；不要关掉 Chrome 窗口。
          </p>

          <button id="submit" type="button">开始读取</button>
          <button class="secondary" id="generateVue" type="button">生成 Vue 3 骨架</button>

          <div id="readProgress" class="read-progress" hidden>
            <div class="read-progress-row">
              <span class="spinner" aria-hidden="true"></span>
              <div>
                <div id="readPhase" class="read-phase"></div>
                <div id="readElapsed" class="read-elapsed">已用时：0 秒</div>
              </div>
            </div>
          </div>

          <div id="status" class="status" role="status" aria-live="polite">等待输入</div>
        </section>

        <section class="stack">
          <section class="card">
            <h2>概要</h2>
            <div class="stats" id="stats">
              <div class="stat"><span>页面</span><strong>-</strong></div>
              <div class="stat"><span>状态</span><strong>-</strong></div>
              <div class="stat"><span>组件</span><strong>-</strong></div>
              <div class="stat"><span>交互</span><strong>-</strong></div>
            </div>
          </section>

          <section class="card">
            <div class="toolbar">
              <button class="secondary" id="downloadOutput">下载 export.json</button>
              <button class="secondary" id="downloadSummary">下载 summary.json</button>
              <button class="secondary" id="downloadScaffold">下载 scaffold.json</button>
              <button class="secondary" id="downloadMarkdown">下载 summary.md</button>
            </div>
            <textarea id="preview" readonly placeholder="结果预览"></textarea>
          </section>

          <section class="card">
            <h3>分析</h3>
            <div class="diagnostics">
              <p id="analysisSummary">当前无 scaffold 分析结果。</p>
              <textarea id="analysisPreview" readonly placeholder="分析详情"></textarea>
            </div>
          </section>

          <section class="card">
            <h3>截图</h3>
            <div id="shotWrap"><p>当前未生成截图。</p></div>
          </section>

          <section class="card">
            <h3>诊断</h3>
            <div class="diagnostics">
              <p id="diagnosticsSummary">当前无诊断信息。</p>
              <textarea id="diagnosticsPreview" readonly placeholder="诊断详情"></textarea>
            </div>
          </section>

          <section class="card">
            <h3>Vue 3 生成</h3>
            <div class="diagnostics">
              <p id="generatedSummary">当前无生成结果。</p>
              <textarea id="generatedPreview" readonly placeholder="生成文件预览"></textarea>
              <div id="generatedFiles" class="files-list"></div>
            </div>
          </section>
        </section>
      </div>
    </div>

    <script>
      const READ_PHASE_MESSAGES = [
        '① 正在启动 Chrome 并导航到墨刀分享页…',
        '② 等待页面与画布脚本就绪（可能出现独立浏览器窗口，属正常现象）…',
        '③ 正在轮询运行时：ProjectExchange / 画布 state（Prototyping 模式下常需 30～90 秒）…',
        '④ 仍在等待：若接近超时，可勾选「调试诊断」后重试，右侧「诊断」页会附带 probe 详情。',
      ];

      const state = {
        output: null,
        summary: null,
        scaffold: null,
        screenshotBase64: null,
        debug: null,
        generated: null,
      };

      let readPhaseTimer = null;
      let readElapsedTimer = null;
      let readStartedAt = 0;

      const refs = {
        url: document.getElementById('url'),
        password: document.getElementById('password'),
        depth: document.getElementById('depth'),
        only: document.getElementById('only'),
        timeoutMs: document.getElementById('timeoutMs'),
        screen: document.getElementById('screen'),
        screenName: document.getElementById('screenName'),
        chromeUserDataDir: document.getElementById('chromeUserDataDir'),
        chromeProfileDirectory: document.getElementById('chromeProfileDirectory'),
        debug: document.getElementById('debug'),
        screenshot: document.getElementById('screenshot'),
        status: document.getElementById('status'),
        submit: document.getElementById('submit'),
        readProgress: document.getElementById('readProgress'),
        readPhase: document.getElementById('readPhase'),
        readElapsed: document.getElementById('readElapsed'),
        preview: document.getElementById('preview'),
        stats: document.getElementById('stats'),
        shotWrap: document.getElementById('shotWrap'),
        diagnosticsSummary: document.getElementById('diagnosticsSummary'),
        diagnosticsPreview: document.getElementById('diagnosticsPreview'),
        analysisSummary: document.getElementById('analysisSummary'),
        analysisPreview: document.getElementById('analysisPreview'),
        generatedSummary: document.getElementById('generatedSummary'),
        generatedPreview: document.getElementById('generatedPreview'),
        generatedFiles: document.getElementById('generatedFiles'),
        downloadOutput: document.getElementById('downloadOutput'),
        downloadSummary: document.getElementById('downloadSummary'),
        downloadScaffold: document.getElementById('downloadScaffold'),
        downloadMarkdown: document.getElementById('downloadMarkdown'),
        generateVue: document.getElementById('generateVue'),
        tabRead: document.getElementById('tabRead'),
        tabAnalyze: document.getElementById('tabAnalyze'),
        tabGenerate: document.getElementById('tabGenerate'),
      };

      const readFormControls = [
        refs.url,
        refs.password,
        refs.depth,
        refs.only,
        refs.timeoutMs,
        refs.screen,
        refs.screenName,
        refs.chromeUserDataDir,
        refs.chromeProfileDirectory,
        refs.debug,
        refs.screenshot,
        refs.submit,
        refs.generateVue,
        refs.tabRead,
        refs.tabAnalyze,
        refs.tabGenerate,
      ].filter(Boolean);

      function formatElapsed(ms) {
        const totalSec = Math.floor(ms / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        return m > 0 ? `${m} 分 ${s} 秒` : `${s} 秒`;
      }

      function startReadProgressUI() {
        stopReadProgressUI();
        refs.readProgress.hidden = false;
        let i = 0;
        refs.readPhase.textContent = READ_PHASE_MESSAGES[0];
        readPhaseTimer = setInterval(() => {
          i = (i + 1) % READ_PHASE_MESSAGES.length;
          refs.readPhase.textContent = READ_PHASE_MESSAGES[i];
        }, 16000);
        readStartedAt = Date.now();
        refs.readElapsed.textContent = '已耗时：0 秒';
        readElapsedTimer = setInterval(() => {
          refs.readElapsed.textContent = `已用时：${formatElapsed(Date.now() - readStartedAt)}`;
        }, 1000);
      }

      function stopReadProgressUI() {
        if (readPhaseTimer) clearInterval(readPhaseTimer);
        if (readElapsedTimer) clearInterval(readElapsedTimer);
        readPhaseTimer = null;
        readElapsedTimer = null;
        refs.readProgress.hidden = true;
        refs.readPhase.textContent = '';
        refs.readElapsed.textContent = '';
      }

      function setReadFormDisabled(disabled) {
        readFormControls.forEach((el) => {
          el.disabled = disabled;
        });
      }

      function setStatus(message, mode = 'default') {
        refs.status.textContent = message;
        if (mode === 'error') {
          refs.status.className = 'status error';
        } else if (mode === 'loading') {
          refs.status.className = 'status loading';
        } else {
          refs.status.className = 'status';
        }
      }

      function renderStats() {
        const values = state.output
          ? [
              state.output.totalScreens,
              state.output.totalStates,
              state.output.totalWidgets ?? 0,
              state.output.totalInteractions ?? 0,
            ]
          : ['-', '-', '-', '-'];
        Array.from(refs.stats.children).forEach((item, index) => {
          item.querySelector('strong').textContent = values[index];
        });
      }

      function renderShot() {
        if (!state.screenshotBase64) {
          refs.shotWrap.innerHTML = '<p>当前未生成截图。</p>';
          return;
        }
        refs.shotWrap.innerHTML = '';
        const img = document.createElement('img');
        img.src = `data:image/png;base64,${state.screenshotBase64}`;
        refs.shotWrap.appendChild(img);
      }

      function renderPreview() {
        refs.preview.value = state.output ? JSON.stringify(state.output, null, 2) : '';
      }

      function renderDiagnostics() {
        if (!state.debug) {
          refs.diagnosticsSummary.textContent = '当前无诊断信息。';
          refs.diagnosticsPreview.value = '';
          return;
        }
        const latestStage = state.debug.waitSummary?.stage || state.debug.failure?.details?.debug?.waitSummary?.stage || 'unknown';
        const probeCount = state.debug.probeHistory?.length || state.debug.failure?.details?.debug?.probeHistory?.length || 0;
        refs.diagnosticsSummary.textContent = `阶段：${latestStage}，探针次数：${probeCount}`;
        refs.diagnosticsPreview.value = JSON.stringify(state.debug, null, 2);
      }

      function renderAnalysis() {
        if (!state.scaffold) {
          refs.analysisSummary.textContent = '当前无 scaffold 分析结果。';
          refs.analysisPreview.value = '';
          return;
        }
        const regions = state.scaffold.regions || {};
        refs.analysisSummary.textContent = `页面：${state.scaffold.page?.name || 'unknown'}，筛选 ${regions.filters?.length || 0}，表格 ${regions.tables?.length || 0}，弹窗 ${regions.dialogs?.length || 0}`;
        refs.analysisPreview.value = JSON.stringify(state.scaffold, null, 2);
      }

      function renderGenerated() {
        if (!state.generated) {
          refs.generatedSummary.textContent = '当前无生成结果。';
          refs.generatedPreview.value = '';
          refs.generatedFiles.innerHTML = '';
          return;
        }
        refs.generatedSummary.textContent = `组件：${state.generated.model.meta.componentName}，路由：${state.generated.model.meta.routeName}`;
        refs.generatedPreview.value = state.generated.files[0]?.content || '';
        refs.generatedFiles.innerHTML = '';
        state.generated.files.forEach((file) => {
          const item = document.createElement('div');
          item.className = 'file-chip';
          item.textContent = file.relativePath;
          refs.generatedFiles.appendChild(item);
        });
      }

      function activateTab(activeRef) {
        [refs.tabRead, refs.tabAnalyze, refs.tabGenerate].forEach((button) => {
          button.classList.remove('active');
        });
        activeRef.classList.add('active');
      }

      function download(name, content, mime = 'application/json;charset=utf-8') {
        const blob = new Blob([content], { type: mime });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = name;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      refs.submit.addEventListener('click', async () => {
        if (!refs.url.value.trim()) {
          setStatus('请先填写墨刀分享链接。', 'error');
          return;
        }
        const timeoutMs = Number(refs.timeoutMs.value || 120000);
        startReadProgressUI();
        setReadFormDisabled(true);
        setStatus(`正在读取（服务端最长等待约 ${Math.round(timeoutMs / 1000)} 秒）…`, 'loading');
        try {
          const response = await fetch('/api/read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              url: refs.url.value.trim(),
              password: refs.password.value,
              depth: refs.depth.value,
              only: refs.only.value,
              timeoutMs,
              screen: refs.screen.value.trim(),
              screenName: refs.screenName.value.trim(),
              chromeUserDataDir: refs.chromeUserDataDir.value.trim(),
              chromeProfileDirectory: refs.chromeProfileDirectory.value.trim(),
              debug: refs.debug.checked,
              screenshot: refs.screenshot.checked ? 'tmp/modao-web-screenshot.png' : '',
            }),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            state.debug = data.error?.details?.debug || data.error || null;
            renderDiagnostics();
            activateTab(refs.tabRead);
            throw new Error(data.error?.message || '请求失败');
          }
          state.output = data.output;
          state.summary = data.summary;
          state.scaffold = data.scaffold;
          state.screenshotBase64 = data.screenshotBase64;
          state.debug = data.debug;
          renderStats();
          renderPreview();
          renderAnalysis();
          renderShot();
          renderDiagnostics();
          activateTab(refs.tabAnalyze);
          setStatus(`完成：${data.meta.projectTitle || 'unknown'}`);
        } catch (error) {
          setStatus(error.message || String(error), 'error');
        } finally {
          stopReadProgressUI();
          setReadFormDisabled(false);
        }
      });

      refs.downloadOutput.addEventListener('click', () => {
        if (state.output) download('modao-export.json', JSON.stringify(state.output, null, 2));
      });
      refs.downloadSummary.addEventListener('click', () => {
        if (state.summary) download('modao-summary.json', JSON.stringify(state.summary, null, 2));
      });
      refs.downloadScaffold.addEventListener('click', () => {
        if (state.scaffold) download('modao-scaffold.json', JSON.stringify(state.scaffold, null, 2));
      });
      refs.downloadMarkdown.addEventListener('click', () => {
        if (state.summary?.markdown) download('modao-summary.md', state.summary.markdown, 'text/markdown;charset=utf-8');
      });

      refs.generateVue.addEventListener('click', async () => {
        if (!state.scaffold) {
          setStatus('请先读取原型，生成 scaffold。', 'error');
          return;
        }
        setReadFormDisabled(true);
        setStatus('正在生成 Vue 3 骨架（通常几秒内完成）…', 'loading');
        try {
          const response = await fetch('/api/generate/vue3', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              scaffold: state.scaffold,
              componentName: state.scaffold.page?.name || '',
              routeName: state.scaffold.page?.name || '',
            }),
          });
          const data = await response.json();
          if (!response.ok || !data.ok) {
            throw new Error(data.error?.message || '生成失败');
          }
          state.generated = data.generated;
          renderGenerated();
          activateTab(refs.tabGenerate);
          setStatus(`已生成：${data.meta.componentName}`);
        } catch (error) {
          setStatus(error.message || String(error), 'error');
        } finally {
          setReadFormDisabled(false);
        }
      });

      refs.tabRead.addEventListener('click', () => activateTab(refs.tabRead));
      refs.tabAnalyze.addEventListener('click', () => activateTab(refs.tabAnalyze));
      refs.tabGenerate.addEventListener('click', () => activateTab(refs.tabGenerate));
    </script>
  </body>
</html>
